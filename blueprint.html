<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICARUS | Blueprint</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ffcc00;
            --grid: #f0f0f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px 40px;
            border-bottom: 2px solid var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            flex: 1;
        }

        /* Sidebars */
        .sidebar {
            padding: 30px;
            border-right: 2px solid var(--text);
            overflow-y: auto;
            background: #fafafa;
        }

        .sidebar.right {
            border-right: none;
            border-left: 2px solid var(--text);
        }

        h3 {
            text-transform: uppercase;
            font-weight: 900;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--text);
            box-sizing: border-box;
            font-weight: bold;
        }

        /* Canvas Area */
        .canvas-container {
            position: relative;
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            max-width: 90%;
            max-height: 90%;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: 2px solid var(--text);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-action:hover {
            background: var(--text);
            color: var(--bg);
        }

        .spec-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .spec-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
        }

        .spec-value {
            font-weight: 800;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">ICARUS / Blueprint</a>
        <div>
            <button class="btn-action" style="margin: 0; padding: 8px 20px; font-size: 0.7rem;" onclick="downloadCanvas()">Download PNG</button>
        </div>
    </header>

    <div class="main-layout">
        <!-- Left: Controls -->
        <div class="sidebar">
            <h3>Parameters</h3>
            <div class="control-group">
                <label>Total Length (mm)</label>
                <input type="number" id="inp_total_len" value="1200" oninput="draw()">
            </div>
            <div class="control-group">
                <label>Chamber Outer Dia (mm)</label>
                <input type="number" id="inp_dia" value="80" oninput="draw()">
            </div>
            <div class="control-group">
                <label>Fuel Tank Length (mm)</label>
                <input type="number" id="inp_tank_len" value="400" oninput="draw()">
            </div>
            <div class="control-group">
                <label>Nozzle Length (mm)</label>
                <input type="number" id="inp_nozzle_len" value="60" oninput="draw()">
            </div>
        </div>

        <!-- Center: Visualization -->
        <div class="canvas-container">
            <canvas id="blueprintCanvas"></canvas>
        </div>

        <!-- Right: Specifications -->
        <div class="sidebar right">
            <h3>Component Specs</h3>
            <div class="spec-item">
                <div class="spec-label">Payload Section</div>
                <div class="spec-value" id="spec_payload">240 mm</div>
            </div>
            <div class="spec-item">
                <div class="spec-label">Recovery System</div>
                <div class="spec-value">Dual Deploy</div>
            </div>
            <div class="spec-item">
                <div class="spec-label">Center of Gravity</div>
                <div class="spec-value">Predicted: 650mm</div>
            </div>
            <div class="spec-item" style="border: none;">
                <div class="spec-label" style="color: var(--accent);">Material Recommendation</div>
                <div class="spec-value">Aluminum 6061-T6</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('blueprintCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            // Get inputs
            const totalLen = parseFloat(document.getElementById('inp_total_len').value) || 0;
            const dia = parseFloat(document.getElementById('inp_dia').value) || 0;
            const tankLen = parseFloat(document.getElementById('inp_tank_len').value) || 0;
            const nozzleLen = parseFloat(document.getElementById('inp_nozzle_len').value) || 0;

            // Set Canvas size
            canvas.width = 600;
            canvas.height = 800;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Scale Factor (Map physical mm to pixels)
            const scale = 500 / totalLen; 
            const pxWidth = dia * scale * 2; // Exaggerate width for visibility
            const pxTotal = totalLen * scale;
            const pxNozzle = nozzleLen * scale;
            const pxTank = tankLen * scale;
            const pxPayload = pxTotal * 0.2; // Payload is 20% of total

            const startX = canvas.width / 2;
            const startY = 100;

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);

            // 1. Draw Nose Cone (Payload)
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(startX - pxWidth/2, startY + pxPayload, startX - pxWidth/2, startY + pxPayload);
            ctx.lineTo(startX + pxWidth/2, startY + pxPayload);
            ctx.quadraticCurveTo(startX + pxWidth/2, startY + pxPayload, startX, startY);
            ctx.stroke();

            // 2. Draw Body Tube
            ctx.strokeRect(startX - pxWidth/2, startY + pxPayload, pxWidth, pxTotal - pxPayload - pxNozzle);

            // 3. Draw Fuel Tank (Indication)
            ctx.fillStyle = '#ffcc0033';
            ctx.fillRect(startX - pxWidth/2, startY + pxTotal - pxNozzle - pxTank, pxWidth, pxTank);
            ctx.strokeRect(startX - pxWidth/2, startY + pxTotal - pxNozzle - pxTank, pxWidth, pxTank);

            // 4. Draw Nozzle
            ctx.beginPath();
            ctx.moveTo(startX - pxWidth/2, startY + pxTotal - pxNozzle);
            ctx.lineTo(startX - pxWidth, startY + pxTotal);
            ctx.lineTo(startX + pxWidth, startY + pxTotal);
            ctx.lineTo(startX + pxWidth/2, startY + pxTotal - pxNozzle);
            ctx.closePath();
            ctx.stroke();

            // 5. Draw Fins (Blueprint Style)
            ctx.beginPath();
            ctx.moveTo(startX - pxWidth/2, startY + pxTotal - pxNozzle - 50);
            ctx.lineTo(startX - pxWidth * 1.5, startY + pxTotal - pxNozzle);
            ctx.lineTo(startX - pxWidth/2, startY + pxTotal - pxNozzle);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(startX + pxWidth/2, startY + pxTotal - pxNozzle - 50);
            ctx.lineTo(startX + pxWidth * 1.5, startY + pxTotal - pxNozzle);
            ctx.lineTo(startX + pxWidth/2, startY + pxTotal - pxNozzle);
            ctx.stroke();

            // Update Specs
            document.getElementById('spec_payload').innerText = (totalLen * 0.2).toFixed(0) + " mm";
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = 'ICARUS_Blueprint.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Initial Draw
        draw();
    </script>
</body>
</html>
