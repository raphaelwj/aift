<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Rocket Lab - Nozzle Design Engine</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --point: #ffcc00; --border: #000000; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .home-btn { background: #fff; color: #000; padding: 8px 15px; border: 2px solid var(--border); text-decoration: none; font-weight: bold; transition: 0.2s; }
        .home-btn:hover { background: var(--point); transform: translateY(-2px); box-shadow: 4px 4px 0px #000; }
        .container { display: flex; gap: 30px; }
        .panel { flex: 1; border: 3px solid var(--border); padding: 25px; box-shadow: 8px 8px 0px #000; background: #fff; }
        h2 { border-bottom: 3px solid var(--border); padding-bottom: 5px; margin-top: 0; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--border); font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; background: #fff; color: #000; border: 3px solid var(--border); padding: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; margin-top: 10px; }
        button:hover { background: var(--point); transform: translateY(-3px); box-shadow: 5px 5px 0px #000; }
        #blueprint-btn { background: var(--point); margin-top: 25px; display: none; }
        #blueprint-btn:hover { background: #000; color: #fff; }
        svg { background: #fff; border: 2px solid var(--border); width: 100%; height: auto; margin-top: 15px; }
        .result-box { margin-top: 20px; padding: 15px; border: 2px solid var(--border); background: #f0f0f0; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="nav-header">
        <h1>[01] NOZZLE ENGINE</h1>
        <a href="index.html" class="home-btn">🏠 HOME</a>
    </div>

    <div class="container">
        <div class="panel">
            <h2>DESIGN PARAMETERS</h2>
            <label>TARGET THRUST (N):</label>
            <input type="number" id="targetThrust" placeholder="EX: 200">
            <button onclick="autoDesign()">AUTO OPTIMIZATION</button>
            <div style="height: 30px; border-left: 2px dashed #000; margin: 10px auto; width: 0;"></div>
            <label>INNER DIAMETER (mm):</label>
            <input type="number" id="innerD" placeholder="D_INNER">
            <label>LENGTH (mm):</label>
            <input type="number" id="length" placeholder="LENGTH">
            <button onclick="manualCalc()">MANUAL CALCULATION</button>
            
            <div id="results" class="result-box" style="display:none;"></div>
            <button id="blueprint-btn" onclick="goToBlueprint()">🎨 GENERATE BLUEPRINT</button>
        </div>

        <div class="panel">
            <h2>PREVIEW RENDERING</h2>
            <div id="svgContainer">
                <svg viewBox="0 0 400 200">
                    <rect width="100%" height="100%" fill="#eee"/>
                    <text x="120" y="105" font-family="Courier" font-size="14">NO DATA RENDERED</text>
                </svg>
            </div>
        </div>
    </div>

    <script>
        let currentDesign = {};

        function autoDesign() {
            const T = parseFloat(document.getElementById('targetThrust').value);
            if (!T) return alert("TARGET THRUST REQUIRED.");
            
            const recInner = Math.sqrt(T / 0.1);
            const throat = recInner * 0.35;
            const exit = recInner * 0.75;
            const length = recInner * 1.2;

            document.getElementById('innerD').value = recInner.toFixed(2);
            document.getElementById('length').value = length.toFixed(2);
            
            currentDesign = { innerD: recInner, length, throat, exit, type: 'auto' };
            renderNozzle(currentDesign);
        }

        function manualCalc() {
            const d = parseFloat(document.getElementById('innerD').value);
            const l = parseFloat(document.getElementById('length').value);
            if (!d || !l) return alert("INNER_D AND LENGTH REQUIRED.");

            const thrust = d * l * 0.05;
            const pressure = d * 0.08;
            const time = l / 80;

            currentDesign = { innerD: d, length: l, throat: d * 0.4, exit: d * 0.8, thrust, pressure, time, type: 'manual' };
            renderNozzle(currentDesign);
        }

        function renderNozzle(data) {
            const res = document.getElementById('results');
            res.style.display = "block";
            res.innerHTML = `
                <b>[ENGINE RESULTS]</b><br>
                THRUST: ${ (data.thrust || (data.innerD * data.length * 0.05)).toFixed(2) } N<br>
                INNER_D: ${ data.innerD.toFixed(2) } mm<br>
                LENGTH: ${ data.length.toFixed(2) } mm
            `;

            const svg = `<svg viewBox="0 0 400 200" style="background:white;">
                <path d="M 50,70 L 150,90 L 150,110 L 50,130 Z" fill="none" stroke="black" stroke-width="2.5"/>
                <path d="M 150,90 L 350,60 L 350,140 L 150,110 Z" fill="none" stroke="black" stroke-width="2.5"/>
                <line x1="30" y1="100" x2="370" y2="100" stroke="black" stroke-dasharray="8,4" stroke-width="1" />
            </svg>`;
            document.getElementById('svgContainer').innerHTML = svg;
            document.getElementById('blueprint-btn').style.display = "block";
            
            localStorage.setItem('rocketDesign', JSON.stringify(data));
        }

        function goToBlueprint() { location.href = 'blueprint.html'; }
    </script>
</body>
</html>
