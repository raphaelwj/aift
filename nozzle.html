<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Lab - 노즐 및 자동 설계</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --orange-color: #f39c12;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
        }
        .tab-btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid #bdc3c7;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--orange-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #e67e22;
        }
        button.auto-btn {
            background-color: var(--accent-color);
        }
        button.auto-btn:hover {
            background-color: #219150;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f0f3f1;
            border-radius: 15px;
            border-left: 5px solid var(--accent-color);
        }
        .result-box h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 18px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 15px;
        }
        .result-value {
            font-weight: bold;
            color: var(--accent-color);
        }
        .visual-area {
            text-align: center;
            margin-top: 25px;
        }
        .nozzle-sketch {
            font-family: monospace;
            white-space: pre;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            line-height: 1.2;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Rocket Lab</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('manual')">수동 계산</button>
        <button class="tab-btn" onclick="openTab('auto')">자동 설계</button>
    </div>

    <!-- 1. 수동 계산 탭 -->
    <div id="manual" class="tab-content active">
        <div class="input-group">
            <label>연료 (고정)</label>
            <input type="text" value="KSNB Fine" disabled>
        </div>
        <div class="input-group">
            <label>챔버 내경 (mm)</label>
            <input type="number" id="m_inner" placeholder="예: 50">
        </div>
        <div class="input-group">
            <label>챔버 길이 (mm)</label>
            <input type="number" id="m_length" placeholder="예: 200">
        </div>
        <div class="input-group">
            <label>외경 (mm)</label>
            <input type="number" id="m_outer" placeholder="예: 70">
        </div>
        <div class="input-group">
            <label>코어 직경 (mm)</label>
            <input type="number" id="m_core" placeholder="예: 20">
        </div>
        <button onclick="calculateManual()">🚀 결과 확인</button>
        <div id="m_error" class="error"></div>

        <div id="m_result" class="result-box" style="display:none;">
            <h3>📊 계산 결과</h3>
            <div class="result-item"><span>예상 추력</span><span class="result-value" id="res_thrust"></span></div>
            <div class="result-item"><span>연소 시간</span><span class="result-value" id="res_time"></span></div>
            <div class="result-item"><span>챔버 압력</span><span class="result-value" id="res_pressure"></span></div>
            <div class="result-item"><span>비추력 (Isp)</span><span class="result-value" id="res_isp"></span></div>
        </div>
    </div>

    <!-- 2. 자동 설계 탭 -->
    <div id="auto" class="tab-content">
        <div class="input-group">
            <label>목표 추력 (N)</label>
            <input type="number" id="a_thrust" placeholder="예: 500">
        </div>
        <div class="input-group">
            <label>로켓 길이 (mm)</label>
            <input type="number" id="a_length" placeholder="예: 1000">
        </div>
        <div class="input-group">
            <label>로켓 외부 직경 (mm)</label>
            <input type="number" id="a_diameter" placeholder="예: 100">
        </div>
        <button class="auto-btn" onclick="designAuto()">🤖 최적 설계 추천</button>
        <div id="a_error" class="error"></div>

        <div id="a_result" class="result-box" style="display:none;">
            <h3>🔩 챔버 및 오링 추천</h3>
            <div class="result-item"><span>챔버 내경</span><span class="result-value" id="rec_inner"></span></div>
            <div class="result-item"><span>챔버 외경</span><span class="result-value" id="rec_outer"></span></div>
            <div class="result-item"><span>추천 오링 규격</span><span class="result-value" id="rec_oring"></span></div>
            <div class="result-item"><span>오링 내경/두께</span><span class="result-value" id="rec_oring_size"></span></div>
            
            <h3>📐 노즐 설계 상세</h3>
            <div class="result-item"><span>목(Throat) 직경</span><span class="result-value" id="rec_throat"></span></div>
            <div class="result-item"><span>출구(Exit) 직경</span><span class="result-value" id="rec_exit"></span></div>
            <div class="result-item"><span>노즐 길이</span><span class="result-value" id="rec_n_length"></span></div>
            <div class="result-item"><span>확장각</span><span class="result-value">15 °</span></div>
        </div>
    </div>

    <!-- 공통 노즐 시각화 영역 -->
    <div id="visual" class="visual-area" style="display:none;">
        <div class="nozzle-sketch" id="sketch">
        /\
       /  \
      /    \
     |      |
     |      |
      \    /
       \  /
        \/
        </div>
    </div>
</div>

<script>
    function openTab(tabName) {
        const contents = document.getElementsByClassName('tab-content');
        const buttons = document.getElementsByClassName('tab-btn');
        for (let content of contents) content.classList.remove('active');
        for (let btn of buttons) btn.classList.remove('active');
        
        document.getElementById(tabName).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 오링 규격 데이터 (AS568 기반 예시)
    const oringData = [
        {name: "AS568-214", id: 24.99, cs: 3.53},
        {name: "AS568-218", id: 31.34, cs: 3.53},
        {name: "AS568-222", id: 37.69, cs: 3.53},
        {name: "AS568-226", id: 50.39, cs: 3.53},
        {name: "AS568-230", id: 63.09, cs: 3.53},
        {name: "AS568-234", id: 75.79, cs: 3.53}
    ];

    function calculateManual() {
        const inner = parseFloat(document.getElementById('m_inner').value);
        const length = parseFloat(document.getElementById('m_length').value);
        const outer = parseFloat(document.getElementById('m_outer').value);
        const core = parseFloat(document.getElementById('m_core').value);
        const errorDiv = document.getElementById('m_error');

        if (!inner || !length || !outer || !core) {
            errorDiv.innerText = "모든 값을 입력해주세요.";
            return;
        }
        if (core >= inner) {
            errorDiv.innerText = "코어 직경은 내경보다 작아야 합니다.";
            return;
        }

        errorDiv.innerText = "";
        
        // 엑셀 SRM_2023 간략 로직 반영
        const thrust = (inner * length * 0.05).toFixed(1);
        const pressure = (inner * 0.08).toFixed(2);
        const time = (length / 80).toFixed(1);
        const isp = 180;

        document.getElementById('res_thrust').innerText = thrust + " N";
        document.getElementById('res_pressure').innerText = pressure + " MPa";
        document.getElementById('res_time').innerText = time + " s";
        document.getElementById('res_isp').innerText = isp + " s";

        document.getElementById('m_result').style.display = "block";
        document.getElementById('visual').style.display = "block";
    }

    function designAuto() {
        const targetThrust = parseFloat(document.getElementById('a_thrust').value);
        const rocketLen = parseFloat(document.getElementById('a_length').value);
        const rocketDia = parseFloat(document.getElementById('a_diameter').value);
        const errorDiv = document.getElementById('a_error');

        if (!targetThrust || !rocketLen || !rocketDia) {
            errorDiv.innerText = "목표값들을 입력해주세요.";
            return;
        }

        errorDiv.innerText = "";

        // 자동 설계 로직 (추력 기반 역산)
        const recInner = Math.sqrt(targetThrust / 0.1).toFixed(1);
        const recOuter = (parseFloat(recInner) + 10).toFixed(1);
        
        // 가장 적합한 오링 찾기 (챔버 외경 기준)
        let bestOring = oringData[0];
        let minDiff = Math.abs(bestOring.id - recOuter);
        
        for (let oring of oringData) {
            let diff = Math.abs(oring.id - recOuter);
            if (diff < minDiff) {
                minDiff = diff;
                bestOring = oring;
            }
        }

        // 노즐 상세 설계
        const throat = (recInner * 0.35).toFixed(1);
        const exit = (recInner * 0.75).toFixed(1);
        const nLength = (recInner * 1.2).toFixed(1);

        document.getElementById('rec_inner').innerText = recInner + " mm";
        document.getElementById('rec_outer').innerText = recOuter + " mm";
        document.getElementById('rec_oring').innerText = bestOring.name;
        document.getElementById('rec_oring_size').innerText = `${bestOring.id} / ${bestOring.cs} mm`;
        
        document.getElementById('rec_throat').innerText = throat + " mm";
        document.getElementById('rec_exit').innerText = exit + " mm";
        document.getElementById('rec_n_length').innerText = nLength + " mm";

        document.getElementById('a_result').style.display = "block";
        document.getElementById('visual').style.display = "block";
    }
</script>

</body>
</html>
