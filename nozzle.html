<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICARUS | Nozzle Design</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ffcc00;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
        }

        .nav-back {
            max-width: 600px;
            margin: 0 auto 25px;
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-block;
            transition: transform 0.2s;
        }

        .nav-back:hover { transform: translateX(-5px); }

        .container {
            max-width: 600px;
            margin: auto;
            border: 3px solid var(--text);
            padding: 40px;
            background: var(--bg);
            border-radius: 25px; /* 곡선 추가 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 35px;
            display: inline-block;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--accent);
            border-radius: 3px;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid var(--text);
            background: none;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 12px; /* 곡선 추가 */
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: var(--text);
            color: var(--bg);
        }

        .tab-btn:hover:not(.active) {
            background-color: #f0f0f0;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--text);
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            border-radius: 12px; /* 곡선 추가 */
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input:disabled {
            background-color: #f5f5f5;
            border-color: #ddd;
            color: #888;
        }

        button.main-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--accent);
            color: var(--text);
            border: 2px solid var(--text);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 15px;
            border-radius: 15px; /* 곡선 추가 */
            transition: all 0.3s;
        }

        button.main-btn:hover {
            background-color: var(--text);
            color: var(--bg);
            transform: translateY(-2px);
        }

        .result-section {
            margin-top: 45px;
            border-top: 2px dashed #eee;
            padding-top: 35px;
        }

        .result-section h3 {
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .res-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .res-item {
            padding: 18px;
            background: #fafafa;
            border-radius: 15px; /* 곡선 추가 */
            border-left: 5px solid var(--accent);
        }

        .res-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 6px;
        }

        .res-val {
            font-size: 1.25rem;
            font-weight: 900;
        }

        .nozzle-draw {
            margin-top: 35px;
            background: var(--text);
            color: var(--accent);
            padding: 25px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            white-space: pre;
            border-radius: 20px; /* 곡선 추가 */
            font-size: 0.9rem;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        @media (max-width: 500px) {
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="/" class="nav-back">← BACK TO DASHBOARD</a>

    <div class="container">
        <h1>Nozzle Design</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('manual')">Manual Analysis</button>
            <button class="tab-btn" onclick="openTab('auto')">Auto Design</button>
        </div>

        <!-- Manual Tab (4 Inputs Restored) -->
        <div id="manual" class="tab-content active">
            <div class="input-group" style="margin-bottom: 25px;">
                <label>Fuel Chemistry</label>
                <input type="text" value="KSNB FINE (Eco-Rocket)" disabled>
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>Chamber Inner ID (mm)</label>
                    <input type="number" id="m_inner" placeholder="50">
                </div>
                <div class="input-group">
                    <label>Chamber Length (mm)</label>
                    <input type="number" id="m_length" placeholder="200">
                </div>
                <div class="input-group">
                    <label>Outer Diameter (mm)</label>
                    <input type="number" id="m_outer" placeholder="70">
                </div>
                <div class="input-group">
                    <label>Core Diameter (mm)</label>
                    <input type="number" id="m_core" placeholder="20">
                </div>
            </div>
            <button class="main-btn" onclick="runManual()">🚀 Calculate Performance</button>
        </div>

        <!-- Auto Tab -->
        <div id="auto" class="tab-content">
            <div class="input-group">
                <label>Target Thrust (N)</label>
                <input type="number" id="a_thrust" placeholder="e.g. 500">
            </div>
            <button class="main-btn" style="background-color: var(--text); color: var(--bg);" onclick="runAuto()">🤖 Generate Optimized Design</button>
        </div>

        <!-- Results -->
        <div id="results" class="result-section" style="display:none;">
            <h3>Simulation Results</h3>
            <div class="res-grid" id="res_container">
                <!-- Dynamic Content -->
            </div>
            
            <div class="nozzle-draw">
        /\
       /  \
      /    \
     |      |
     |      |
      \    /
       \  /
        \/
            </div>
        </div>
    </div>

    <script>
        function openTab(name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function runManual() {
            const inner = document.getElementById('m_inner').value;
            const length = document.getElementById('m_length').value;
            if(!inner || !length) return;
            showResults([
                {label: "Predicted Thrust", val: (inner * length * 0.05).toFixed(1) + " N"},
                {label: "Chamber Pressure", val: (inner * 0.06).toFixed(2) + " MPa"},
                {label: "Isp (Eco-Fuel)", val: "185 s"},
                {label: "Burn Time", val: (length / 85).toFixed(1) + " s"}
            ]);
        }

        function runAuto() {
            const thrust = document.getElementById('a_thrust').value;
            if(!thrust) return;
            const inner = Math.sqrt(thrust * 12).toFixed(1);
            showResults([
                {label: "Rec. Inner ID", val: inner + " mm"},
                {label: "Rec. O-Ring", val: "AS568-214"},
                {label: "Throat Dia", val: (inner * 0.38).toFixed(1) + " mm"},
                {label: "Safety Factor", val: "2.5x"}
            ]);
        }

        function showResults(data) {
            const container = document.getElementById('res_container');
            container.innerHTML = data.map(d => `
                <div class="res-item">
                    <div class="res-label">${d.label}</div>
                    <div class="res-val">${d.val}</div>
                </div>
            `).join('');
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
