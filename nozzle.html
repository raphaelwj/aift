<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Rocket Lab - Nozzle Design</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; margin-bottom: 20px; }
        .home-btn { background: #ffcc00; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; }
        .container { display: flex; gap: 20px; }
        .panel { flex: 1; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        h2 { color: #ffcc00; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; background: #ffcc00; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #fff; }
        #blueprint-btn { background: #28a745; color: #fff; margin-top: 20px; display: none; }
        svg { background: #fff; border-radius: 5px; width: 100%; height: auto; margin-top: 10px; }
        .result-box { margin-top: 15px; padding: 10px; background: #222; border-left: 4px solid #ffcc00; }
    </style>
</head>
<body>
    <div class="nav-header">
        <h1>Nozzle Design Engine</h1>
        <a href="index.html" class="home-btn">🏠 Home</a>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Design Input</h2>
            <label>목표 추력 (N):</label>
            <input type="number" id="targetThrust" placeholder="예: 100">
            <button onclick="autoDesign()">자동 최적화 설계</button>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <label>수동 내경 (mm):</label>
            <input type="number" id="innerD" placeholder="내경">
            <label>수동 길이 (mm):</label>
            <input type="number" id="length" placeholder="길이">
            <button onclick="manualCalc()">수동 계산 및 도면 생성</button>
            
            <div id="results" class="result-box" style="display:none;"></div>
            <button id="blueprint-btn" onclick="goToBlueprint()">🎨 정밀 블루프린트 보기</button>
        </div>

        <div class="panel">
            <h2>Schematic Preview</h2>
            <div id="svgContainer"></div>
        </div>
    </div>

    <script>
        let currentDesign = {};

        function autoDesign() {
            const T = parseFloat(document.getElementById('targetThrust').value);
            if (!T) return alert("목표 추력을 입력하세요.");
            
            const recInner = Math.sqrt(T / 0.1);
            const throat = recInner * 0.35;
            const exit = recInner * 0.75;
            const length = recInner * 1.2;

            document.getElementById('innerD').value = recInner.toFixed(2);
            document.getElementById('length').value = length.toFixed(2);
            
            currentDesign = { innerD: recInner, length, throat, exit, type: 'auto' };
            renderNozzle(currentDesign);
        }

        function manualCalc() {
            const d = parseFloat(document.getElementById('innerD').value);
            const l = parseFloat(document.getElementById('length').value);
            if (!d || !l) return alert("내경과 길이를 입력하세요.");

            const thrust = d * l * 0.05;
            const pressure = d * 0.08;
            const time = l / 80;

            currentDesign = { innerD: d, length: l, throat: d * 0.4, exit: d * 0.8, thrust, pressure, time, type: 'manual' };
            renderNozzle(currentDesign);
        }

        function renderNozzle(data) {
            const res = document.getElementById('results');
            res.style.display = "block";
            res.innerHTML = `
                <b>계산 결과:</b><br>
                추력: ${ (data.thrust || (data.innerD * data.length * 0.05)).toFixed(2) } N<br>
                내경: ${ data.innerD.toFixed(2) } mm / 길이: ${ data.length.toFixed(2) } mm
            `;

            const svg = `<svg viewBox="0 0 400 200">
                <path d="M 50,70 L 150,90 L 150,110 L 50,130 Z" fill="none" stroke="black" stroke-width="2"/>
                <path d="M 150,90 L 350,60 L 350,140 L 150,110 Z" fill="none" stroke="black" stroke-width="2"/>
                <line x1="30" y1="100" x2="370" y2="100" stroke="gray" stroke-dasharray="5,5" />
            </svg>`;
            document.getElementById('svgContainer').innerHTML = svg;
            document.getElementById('blueprint-btn').style.display = "block";
            
            // 데이터 저장
            localStorage.setItem('rocketDesign', JSON.stringify(data));
        }

        function goToBlueprint() {
            location.href = 'blueprint.html';
        }
    </script>
</body>
</html>
