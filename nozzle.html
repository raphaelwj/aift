<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICARUS | Nozzle Design</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ffcc00;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
        }

        .nav-back {
            max-width: 600px;
            margin: 0 auto 20px;
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
            display: inline-block;
        }

        .container {
            max-width: 600px;
            margin: auto;
            border: 3px solid var(--text);
            padding: 40px;
            background: var(--bg);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 30px;
            border-bottom: 5px solid var(--accent);
            display: inline-block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--text);
            background: none;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: var(--text);
            color: var(--bg);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--text);
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        button.main-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--accent);
            color: var(--text);
            border: 2px solid var(--text);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        button.main-btn:hover {
            background-color: var(--text);
            color: var(--bg);
        }

        .result-section {
            margin-top: 40px;
            border-top: 2px solid #ddd;
            padding-top: 30px;
        }

        .result-section h3 {
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .res-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .res-item {
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid var(--accent);
        }

        .res-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
        }

        .res-val {
            font-size: 1.2rem;
            font-weight: 900;
        }

        .nozzle-draw {
            margin-top: 30px;
            background: var(--text);
            color: var(--accent);
            padding: 20px;
            font-family: monospace;
            text-align: center;
            white-space: pre;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <a href="/" class="nav-back">← BACK TO DASHBOARD</a>

    <div class="container">
        <h1>Nozzle</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('manual')">Manual</button>
            <button class="tab-btn" onclick="openTab('auto')">Auto</button>
        </div>

        <!-- Manual Tab -->
        <div id="manual" class="tab-content active">
            <div class="input-group">
                <label>Fuel Type</label>
                <input type="text" value="KSNB FINE" disabled style="background: #eee;">
            </div>
            <div class="input-group">
                <label>Chamber Inner ID (mm)</label>
                <input type="number" id="m_inner">
            </div>
            <div class="input-group">
                <label>Chamber Length (mm)</label>
                <input type="number" id="m_length">
            </div>
            <button class="main-btn" onclick="runManual()">Calculate</button>
        </div>

        <!-- Auto Tab -->
        <div id="auto" class="tab-content">
            <div class="input-group">
                <label>Target Thrust (N)</label>
                <input type="number" id="a_thrust">
            </div>
            <button class="main-btn" style="background-color: var(--text); color: var(--bg);" onclick="runAuto()">Generate Design</button>
        </div>

        <!-- Results -->
        <div id="results" class="result-section" style="display:none;">
            <h3 id="res_title">Analysis Results</h3>
            <div class="res-grid" id="res_container">
                <!-- Dynamic Content -->
            </div>
            
            <div class="nozzle-draw">
        /\
       /  \
      /    \
     |      |
     |      |
      \    /
       \  /
        \/
            </div>
        </div>
    </div>

    <script>
        function openTab(name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function runManual() {
            const inner = document.getElementById('m_inner').value;
            if(!inner) return;
            showResults([
                {label: "Thrust", val: (inner * 1.5).toFixed(1) + " N"},
                {label: "Pressure", val: (inner * 0.05).toFixed(2) + " MPa"},
                {label: "Isp", val: "185 s"}
            ]);
        }

        function runAuto() {
            const thrust = document.getElementById('a_thrust').value;
            if(!thrust) return;
            const inner = Math.sqrt(thrust * 10).toFixed(1);
            showResults([
                {label: "Rec. Inner ID", val: inner + " mm"},
                {label: "Rec. O-Ring", val: "AS568-214"},
                {label: "Throat Dia", val: (inner * 0.4).toFixed(1) + " mm"}
            ]);
        }

        function showResults(data) {
            const container = document.getElementById('res_container');
            container.innerHTML = data.map(d => `
                <div class="res-item">
                    <div class="res-label">${d.label}</div>
                    <div class="res-val">${d.val}</div>
                </div>
            `).join('');
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
