<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Lab - Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        header { border-bottom: 2px solid #ffcc00; padding: 20px 0; margin-bottom: 40px; }
        h1 { color: #ffcc00; font-size: 2.5rem; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 15px; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: #ffcc00; transform: translateY(-5px); box-shadow: 0 5px 20px rgba(255, 204, 0, 0.2); }
        .card h2 { color: #ffcc00; margin-top: 0; }
        .card p { color: #ccc; font-size: 0.9rem; line-height: 1.6; }
        .btn { background: #ffcc00; color: #000; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ROCKET LAB PROJECT</h1>
            <p>Eco-friendly Propulsion System Design Platform</p>
        </header>
        <div class="grid">
            <div class="card" onclick="location.href='nozzle.html'">
                <h2>Nozzle Design</h2>
                <p>수동 계산 및 자동 설계 알고리즘을 통한 추진기 노즐 최적화 설계.</p>
                <a href="nozzle.html" class="btn">Start Design</a>
            </div>
            <div class="card" onclick="location.href='blueprint.html'">
                <h2>Blueprint & 3D</h2>
                <p>노즈콘, 몸체, 노즐의 통합 정밀 도면 생성 및 3D 모델링 파일 제작.</p>
                <a href="blueprint.html" class="btn">View Blueprints</a>
            </div>
            <div class="card">
                <h2>O-Ring Data</h2>
                <p>AS568-214 ~ AS568-234 시리즈 데이터 및 나사 체결 규격 조회.</p>
                <a href="#" class="btn">View Specs</a>
            </div>
        </div>
    </div>
</body>
</html>
