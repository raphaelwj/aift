<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Lab - Design System V2</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --point: #ffcc00; --border: #000000; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 50px auto; padding: 20px; border: 3px solid var(--border); box-shadow: 10px 10px 0px var(--border); }
        header { border-bottom: 3px solid var(--border); padding-bottom: 20px; margin-bottom: 40px; text-align: left; position: relative; }
        header h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        header::after { content: ""; position: absolute; right: 0; top: 0; width: 50px; height: 50px; background: var(--point); border: 3px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .card { border: 3px solid var(--border); padding: 30px; transition: 0.2s ease; cursor: pointer; position: relative; background: #fff; }
        .card:hover { transform: translate(-5px, -5px); box-shadow: 8px 8px 0px var(--border); background: var(--point); }
        .card h2 { margin-top: 0; font-size: 1.5rem; text-decoration: underline; }
        .card p { font-size: 0.9rem; line-height: 1.4; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; border: 2px solid var(--border); background: #fff; color: var(--text); font-weight: bold; text-decoration: none; transition: 0.2s; }
        .card:hover .btn { background: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ROCKET LAB<br>ENGINEERING</h1>
            <p>Precise Propulsion System Design Platform [v2.0]</p>
        </header>
        <div class="grid">
            <div class="card" onclick="location.href='nozzle.html'">
                <h2>01. NOZZLE DESIGN</h2>
                <p>수동/자동 계산 알고리즘을 이용한 노즐 설계 엔진.</p>
                <div class="btn">ACCESS ENGINE</div>
            </div>
            <div class="card" onclick="location.href='blueprint.html'">
                <h2>02. BLUEPRINT & 3D</h2>
                <p>정밀 도면(SVG) 및 3D 모델링(STL) 추출.</p>
                <div class="btn">OPEN BLUEPRINT</div>
            </div>
            <div class="card">
                <h2>03. DATA SPECS</h2>
                <p>O-Ring (AS568) 및 나사 규격 라이브러리.</p>
                <div class="btn">VIEW SPECS</div>
            </div>
        </div>
    </div>
</body>
</html>
